<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1200px;
        height: 630px;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .brand {
        font-size: 72px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 24px;
      }
      .brand .prompt {
        color: #00ff88;
        font-family: monospace;
      }
      .tagline {
        font-size: 28px;
        color: #888899;
        margin-bottom: 32px;
      }
      .services {
        font-size: 20px;
        color: #555566;
        font-family: monospace;
        margin-bottom: 80px;
      }
      .install {
        font-size: 18px;
        color: #00ff88;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div style="margin-bottom: 24px">
      <svg width="120" height="120" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="19" r="7.5" fill="none" stroke="#00ff88" stroke-width="2" />
        <circle cx="13.5" cy="18" r="1.5" fill="#00ff88" />
        <circle cx="18.5" cy="18" r="1.5" fill="#00ff88" />
        <polyline
          points="16,11.5 14,9 18,7 16,4.5"
          fill="none"
          stroke="#00ff88"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle cx="16" cy="4.5" r="1.5" fill="#00ff88" />
      </svg>
    </div>
    <div class="brand">aimock</div>
    <div class="tagline">Mock everything your AI app talks to</div>
    <div class="services">
      LLM APIs &nbsp;|&nbsp; MCP &nbsp;|&nbsp; A2A &nbsp;|&nbsp; Vector DBs &nbsp;|&nbsp; Search
    </div>
    <div class="install">npm install @copilotkit/aimock</div>
  </body>
</html>
